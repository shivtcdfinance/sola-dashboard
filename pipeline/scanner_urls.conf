# Scanner URL Configuration
# ==========================
# One URL per line. Lines starting with # are comments.
# The scanner loads all non-comment URLs and processes them IN ORDER.
# If a URL returns zero results, the scanner falls through to the next URL.
# If ALL URLs return zero, the scanner reports "0 jobs this hour."
#
# Edit this file directly to:
#   - Add/remove URLs
#   - Change time filters (f_TPR=)
#   - Add new locations (geoId=)
#   - Comment out a URL with # to disable it
#
# 🔴 No other file or prompt overrides these URLs. This file is the authority.

# PRIMARY — Past hour (India)
https://www.linkedin.com/jobs/search/?f_TPR=r3600&geoId=102713980&origin=JOB_SEARCH_PAGE_SEARCH_BUTTON&refresh=true

# FALLBACK — Broader time range (India), used only when PRIMARY returns zero
https://www.linkedin.com/jobs/search/?f_TPR=r10000&geoId=102713980&origin=JOB_SEARCH_PAGE_SEARCH_BUTTON&refresh=true
